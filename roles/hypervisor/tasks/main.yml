- name: Create ZFS dataset to hold VM templates
  community.general.zfs:
    name: main-storage/vm-templates-test
    state: present

- name: Create folder storage for VM templates
  community.proxmox.proxmox_storage:
    nodes:
      - olympus
    name: vm-templates-test
    type: dir
    content:
      - vztmpl
    dir_options:
      path: /main-storage/vm-templates-test

- name: Fetch fedora image into storage
  community.proxmox.proxmox_template:
    node: olympus
    storage: vm-templates-test
    name: fedora-44-default_20260713_amd64.tar.xz

