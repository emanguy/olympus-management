- name: Create ZFS dataset to hold VM templates
  community.general.zfs:
    name: main-storage/vm-templates
    state: present

- name: Create folder storage for VM templates
  community.proxmox.proxmox_storage:
    nodes:
      - olympus
    name: vm-templates
    type: dir
    content:
      - vztmpl
    dir_options:
      path: /main-storage/vm-templates

- name: Fetch fedora image into storage
  community.proxmox.proxmox_template:
    node: olympus
    storage: vm-templates
    template: ubuntu-26.04-standard_26.04-1_amd64.tar.zst

