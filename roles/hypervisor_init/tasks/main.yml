- name: Install necessary packages
  ansible.builtin.apt:
    update_cache: true
    name: 
      - ansible
      - git
      - python3-proxmoxer
      - python3-requests

- name: Populate password file
  ansible.builtin.copy:
    src: ~/.ansible-pass
    dest: /root/.ansible-pass
    owner: root
    group: root
    mode: '0600'

- name: Create ZFS dataset to host management repo
  community.general.zfs:
    name: main-storage/management
    state: present
    extra_zfs_properties:
      refquota: 1G

- name: Clone this repo to hypervisor
  ansible.builtin.git:
    repo: "https://github.com/emanguy/olympus-management.git"
    dest: /main-storage/management/
    version: main

- name: Set up cron job to auto-run ansible jobs
  ansible.builtin.include_role:
    name: systemd_template
    tasks_from: cron_unit
  vars:
    cron_name: ansible-config-pull
    cron_description: Regularly pull ansible configuration from github and apply
    cron_command: /main-storage/management/conditionally-cron.sh
    cron_workdir: /main-storage/management/
    cron_schedule: "*:0/10"
